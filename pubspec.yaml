name: black_queen_scorer
description: "Fast offline score tracker for bidding-based team card games."
publish_to: 'none'
version: 1.0.0+3

environment:
  sdk: ^3.3.0
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.5.1
  go_router: ^14.6.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  uuid: ^4.5.1
  share_plus: ^10.1.2
  screenshot: ^3.0.0
  phosphor_flutter: ^2.1.0
  intl: ^0.19.0
  characters: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.2
  flutter_native_splash: ^2.4.2

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  adaptive_icon_background: "#0A1F1A"
  adaptive_icon_foreground: "assets/icon/icon_foreground.png"

flutter_native_splash:
  color: "#0A1F1A"
  image: "assets/icon/splash.png"
  color_dark: "#0A1F1A"
  image_dark: "assets/icon/splash.png"
  android_12:
    image: "assets/icon/splash.png"
    color: "#0A1F1A"
    image_dark: "assets/icon/splash.png"
    color_dark: "#0A1F1A"
  android: true
  ios: true
  fullscreen: false
